name: Docker CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t gauravgehlot03/cicd-project:latest .

      - name: Push Docker Image
        run: docker push gauravgehlot03/cicd-project:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0

        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}

          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/cicd-project:latest

            docker stop app || true
            docker rm app || true

            docker run -d \
              --name app \
              -p 3000:80 \
              ${{ secrets.DOCKER_USERNAME }}/cicd-project:latest
